    <script src="/app/admin/component/layui/layui.js"></script>
    <script>
        layui.use(['form', 'element', 'layer'], function(){
            var form = layui.form,
                element = layui.element,
                layer = layui.layer;

            // 保存配置
            form.on('submit(config-save)', function(data){
                layer.load(2);
                $.post('/app/admin/system-config/update', data.field, function(res){
                    layer.closeAll('loading');
                    if(res.code === 0){
                        layer.msg('保存成功', {icon: 1});
                    } else {
                        layer.msg(res.msg || '保存失败', {icon: 2});
                    }
                });
                return false;
            });

            // 清除缓存
            $('#clear-cache').click(function(){
                layer.load(2);
                $.post('/app/admin/system-config/clear-cache', {}, function(res){
                    layer.closeAll('loading');
                    if(res.code === 0){
                        layer.msg('缓存清除成功', {icon: 1});
                    } else {
                        layer.msg(res.msg || '清除失败', {icon: 2});
                    }
                });
            });
        });
    </script>
