  <script src="https://cdn.bootcdn.net/ajax/libs/layui/2.8.18/layui.min.js"></script>
  <script>
    const tradeId = '<?=$trade_id?>';
    const expirationTime = <?=strtotime($expired_at)?>;
    
    // 支付时间倒计时
    function clock() {
      const timeout = new Date(expirationTime * 1000);
      const now = new Date();
      const ms = timeout.getTime() - now.getTime(); // 时间差的毫秒数
      const second = Math.round(ms / 1000);
      const minute = Math.floor(second / 60);
      const hour = Math.floor(minute / 60);
      const adjustedMinute = minute > 60 ? minute % 60 : minute;
      
      if (ms <= 0) {
        // 显示二维码遮罩
        document.getElementById('qr-mask').classList.add('show');
        
        layui.use(['layer'], function(){
          var layer = layui.layer;
          layer.alert("支付超时，请重新发起支付！", {icon: 5});
        });
        return;
      }
      
      document.querySelector('.hours').textContent = hour.toString().padStart(2, '0');
      document.querySelector('.minutes').textContent = adjustedMinute.toString().padStart(2, '0');
      document.querySelector('.seconds').textContent = (second % 60).toString().padStart(2, '0');
      
      return setTimeout(clock, 1000);
    }
    
    // 检查支付状态
    function checkStatus() {
      fetch(`/pay/check-status/${tradeId}`)
        .then(response => response.json())
        .then(data => {
          if (data.status_code === 200 && data.data.status === 2) {
            location.reload();
          }
        })
        .catch(error => console.error('Error:', error));
    }
    
    // 复制地址
    function copyAddress() {
      const address = '<?=$token?>';
      navigator.clipboard.writeText(address).then(() => {
        layui.use(['layer'], function(){
          var layer = layui.layer;
          layer.msg('地址已复制到剪贴板', {icon: 1});
        });
      });
    }
    
    // 复制金额
    function copyAmount() {
      const amount = '<?=number_format($actual_amount, 4)?>';
      navigator.clipboard.writeText(amount).then(() => {
        layui.use(['layer'], function(){
          var layer = layui.layer;
          layer.msg('金额已复制到剪贴板', {icon: 1});
        });
      });
    }
    
    // 自动检查支付状态和启动倒计时
    <?php if ($status == 1): ?>
    setInterval(checkStatus, 3000);
    setTimeout(clock, 1000);
    <?php endif; ?>
  </script>
